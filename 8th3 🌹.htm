<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy International Women's Day</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/qvjz8QFW/Logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family:
    "Outfit",
    "Inter",
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;
  background: linear-gradient(135deg, #ffd1dc 0%, #ffafbd 50%, #ffc3a0 100%);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  overflow-x: hidden;
  overflow-y: auto;
}

@keyframes gradientBG {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

.container {
  width: 90%;
  max-width: 800px;
  z-index: 10;
  position: relative;
}

h1 {
  color: #d81b60;
  font-size: 2.5rem;
  margin-bottom: 1rem;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
}

p {
  color: #ad1457;
  font-size: 1.1rem;
  line-height: 1.6;
  margin-bottom: 2rem;
}

.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2.5rem;
  perspective: 1000px;
}

@media (max-width: 600px) {
  .menu {
    grid-template-columns: 1fr;
    gap: 1rem;
    padding-top: 2rem;
    padding-bottom: 2rem;
  }

  .menu-item {
    padding: 1rem 1rem;
    font-size: 1rem;
    border-radius: 1.5rem;
    animation: none !important;
    transform: none !important;
  }

  .menu-item .icon img {
    width: 40px;
    height: 40px;
  }
}

.menu-item {
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 2px solid rgba(255, 255, 255, 0.5);
  border-radius: 2rem;
  padding: 2.5rem 1.5rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  color: #d81b60;
  font-weight: 700;
  font-size: 1.2rem;
  box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.15);
  animation: float 6s ease-in-out infinite;
}

.menu-item:nth-child(even) {
  animation-delay: -3s;
}

.menu-item:hover {
  transform: scale(1.1) translateY(-5px);
  background: #fff;
  box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
}

.menu-item .icon {
  font-size: 3.5rem;
  filter: drop-shadow(0 5px 10px rgba(255, 105, 180, 0.3));
  display: flex;
  align-items: center;
  justify-content: center;
}

.menu-item .icon img {
  width: 80px;
  height: 80px;
  object-fit: contain;
}

.menu-item:active {
  transform: scale(0.9) translateY(5px);
  box-shadow: 0 2px 10px 0 rgba(255, 105, 180, 0.2);
  background: rgba(255, 255, 255, 0.5);
  transition: all 0.1s ease;
}

@keyframes float {

  0%,
  100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-20px);
  }
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(45deg, rgba(255, 255, 255, 0.1) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255, 255, 255, 0.1) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.1) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.1) 75%);
  background-size: 60px 60px;
  background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
  pointer-events: none;
  z-index: 1;
}

.heart {
  position: fixed;
  bottom: -50px;
  color: #ff69b4;
  font-size: 20px;
  user-select: none;
  pointer-events: none;
  z-index: -1;
  animation: flyUp linear forwards;
}

@keyframes flyUp {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }

  100% {
    transform: translateY(-110vh) rotate(360deg);
    opacity: 0;
  }
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

.letter-modal {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  width: 90%;
  max-width: 500px;
  height: 650px;
  padding: 40px;
  position: relative;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow:
    0 25px 50px -12px rgba(216, 27, 96, 0.2),
    0 0 0 8px rgba(255, 255, 255, 0.4);
  transform: translateY(50px) scale(0.9);
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.letter-modal::after {
  content: "";
  position: absolute;
  top: 15px;
  left: 15px;
  right: 15px;
  bottom: 15px;
  border: 1px dashed rgba(216, 27, 96, 0.3);
  border-radius: 20px;
  pointer-events: none;
}

.overlay.active .letter-modal {
  transform: translateY(0) scale(1);
}

.close-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 40px;
  height: 40px;
  background: rgba(216, 27, 96, 0.8);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: all 0.3s ease;
  backdrop-filter: blur(5px);
}

.close-btn:hover {
  background: #d81b60;
  transform: rotate(90deg) scale(1.1);
}

.letter-content {
  color: #444;
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
  z-index: 2;
}

.letter-body {
  font-family: "Dancing Script", cursive;
  font-size: 1.6rem;
  line-height: 2;
  color: #5d4037;
  overflow-y: auto;
  flex-grow: 1;
  padding: 10px 15px 10px 0;
  -ms-overflow-style: none;
  /* IE and Edge */
  scrollbar-width: none;
  /* Firefox */
}

.letter-body::-webkit-scrollbar {
  display: none;
  /* Chrome, Safari and Opera */
}

.letter-body p {
  margin-bottom: 25px;
  color: inherit;
  font-size: inherit;
  line-height: inherit;
}

.letter-gif {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 120px;
  height: auto;
  pointer-events: none;
  z-index: 1;
  opacity: 0.6;
  filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.1));
}

.letter-footer {
  text-align: right;
  margin-top: 30px;
  font-size: 1.8rem !important;
  font-weight: bold;
  color: #d81b60 !important;
}

@media (max-width: 480px) {
  .letter-modal {
    padding: 30px 20px;
  }

  .letter-body {
    font-size: 1.2rem;
  }
}

.music-modal {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  width: 90%;
  max-width: 450px;
  height: 650px;
  padding: 30px;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow:
    0 25px 50px -12px rgba(216, 27, 96, 0.2),
    0 0 0 8px rgba(255, 255, 255, 0.4);
  position: relative;
  color: #d81b60;
  transform: translateY(50px) scale(0.9);
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  flex-direction: column;
}

.overlay.active .music-modal {
  transform: translateY(0) scale(1);
}

.spotify-player {
  display: flex;
  flex-direction: column;
  gap: 20px;
  flex-grow: 1;
  overflow: hidden;
}

.player-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 1rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 800;
  color: #ad1457;
  opacity: 0.8;
}

.spotify-logo {
  width: 28px;
  height: 28px;
  filter: drop-shadow(0 4px 6px rgba(216, 27, 96, 0.3));
}

.now-playing {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding-bottom: 10px;
}

.song-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  width: 100%;
}

.album-art {
  width: 200px;
  height: 200px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 15px 35px rgba(216, 27, 96, 0.25);
  background: linear-gradient(135deg, #ffd1dc, #ff8aab);
  position: relative;
  transition: transform 0.5s ease;
}

.album-art:hover {
  transform: scale(1.05) rotate(2deg);
}

.album-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.song-details {
  margin-top: 5px;
}

.song-details h3 {
  margin: 0;
  font-size: 1.4rem;
  color: #d81b60;
  font-weight: 800;
}

.song-details p {
  margin: 4px 0 0;
  font-size: 1rem;
  color: #ad1457;
  opacity: 0.7;
}

.player-controls {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.progress-container {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.85rem;
  color: #ad1457;
  font-weight: 600;
}

.progress-bar {
  flex-grow: 1;
  height: 8px;
  background: rgba(216, 27, 96, 0.1);
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.progress {
  height: 100%;
  background: linear-gradient(90deg, #ff8aab, #d81b60);
  border-radius: 10px;
  width: 0%;
  position: relative;
  transition: width 0.1s linear;
}

.control-buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
}

.ctrl-btn {
  background: none;
  border: none;
  color: #ff8aab;
  font-size: 1.8rem;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ctrl-btn:hover {
  color: #d81b60;
  transform: scale(1.2);
}

.ctrl-btn.play-pause {
  width: 65px;
  height: 65px;
  background: linear-gradient(135deg, #d81b60, #ad1457);
  color: white;
  border-radius: 50%;
  font-size: 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 20px rgba(216, 27, 96, 0.4);
}

.ctrl-btn.play-pause:hover {
  transform: scale(1.1) translateY(-2px);
  box-shadow: 0 12px 25px rgba(216, 27, 96, 0.5);
}

.song-list {
  margin-top: 10px;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-right: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(216, 27, 96, 0.2) transparent;
}

.song-list::-webkit-scrollbar {
  width: 4px;
}

.song-list::-webkit-scrollbar-thumb {
  background: rgba(216, 27, 96, 0.2);
  border-radius: 10px;
}

.song-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 12px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  background: rgba(255, 255, 255, 0.3);
  border: 1px solid transparent;
}

.song-item:hover {
  background: rgba(255, 255, 255, 0.6);
  transform: translateX(5px);
  border-color: rgba(216, 27, 96, 0.1);
}

.song-item.active {
  background: rgba(216, 27, 96, 0.1);
  border-color: rgba(216, 27, 96, 0.2);
}

.song-item img {
  width: 50px;
  height: 50px;
  border-radius: 12px;
  object-fit: cover;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

.song-item-info {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.song-item-title {
  font-size: 1rem;
  font-weight: 700;
  color: #d81b60;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-item-artist {
  font-size: 0.85rem;
  color: #ad1457;
  opacity: 0.7;
}

.image-modal {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  width: 90%;
  max-width: 600px;
  height: 650px;
  padding: 40px 20px;
  position: relative;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow:
    0 25px 50px -12px rgba(216, 27, 96, 0.2),
    0 0 0 8px rgba(255, 255, 255, 0.4);
  transform: translateY(50px) scale(0.9);
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.overlay.active .image-modal {
  transform: translateY(0) scale(1);
}

.gallery-container {
  display: flex;
  flex-direction: column;
  gap: 30px;
  width: 100%;
  overflow: hidden;
  cursor: grab;
}

.gallery-container:active {
  cursor: grabbing;
}

.gallery-row {
  display: flex;
  width: max-content;
  pointer-events: auto;
}

.gallery-row img {
  height: 200px;
  width: 150px;
  object-fit: cover;
  border-radius: 16px;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
  border: 4px solid white;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
  margin-right: 20px;
}

.gallery-row img:hover {
  transform: scale(1.1) translateY(-10px) rotate(2deg);
  box-shadow: 0 15px 30px rgba(216, 27, 96, 0.2);
  z-index: 10;
}

.row-top {
  animation: scroll-left 30s linear infinite;
}

.row-bottom {
  animation: scroll-right 30s linear infinite;
}

@keyframes scroll-left {
  0% {
    transform: translateX(0);
  }

  100% {
    transform: translateX(-50%);
  }
}

@keyframes scroll-right {
  0% {
    transform: translateX(-50%);
  }

  100% {
    transform: translateX(0);
  }
}

.lightbox-content {
  position: relative;
  max-width: 90%;
  max-height: 90%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#lightbox-img {
  max-width: 100%;
  max-height: 85vh;
  border-radius: 8px;
  box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
  border: 5px solid white;
}

@media (max-width: 480px) {
  .image-modal {
    height: 500px;
  }

  .gallery-row img {
    height: 140px;
    width: 110px;
  }

  .gallery-gif-wrapper.top {
    top: 5px;
    left: 5px;
  }

  .gallery-gif-wrapper.bottom {
    bottom: 5px;
    right: 5px;
  }

  .gallery-gif {
    width: 40px !important;
  }

  .gallery-gif-wrapper.bottom .gallery-gif {
    width: 100px !important;
  }

  .gallery-gif-wrapper.top .gallery-gif {
    width: 100px !important;
  }

  .flying-text {
    font-size: 0.8rem !important;
  }
}

.gallery-gif-wrapper {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 15px;
  pointer-events: none;
  z-index: 10;
  max-width: calc(100% - 20px);
  overflow: hidden;
}

.gallery-gif-wrapper.top {
  top: 10px;
  left: 10px;
  flex-direction: row;
}

.gallery-gif-wrapper.bottom {
  bottom: 10px;
  right: 10px;
  flex-direction: row;
}

.gallery-gif {
  width: 80px;
  height: auto;
  opacity: 0.9;
  z-index: 11;
}

.gallery-gif-wrapper.bottom .gallery-gif {
  width: 100px;
}

.flying-text {
  font-size: 1.2rem;
  font-weight: bold;
  color: #ff1493;
  text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
  white-space: nowrap;
}

.text-right {
  animation: run-right 8s linear infinite;
}

.text-left {
  animation: run-left 8s linear infinite;
}

@keyframes run-right {
  0% {
    transform: translateX(-100%);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  90% {
    opacity: 1;
  }

  100% {
    transform: translateX(100%);
    opacity: 0;
  }
}

@keyframes run-left {
  0% {
    transform: translateX(100%);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  90% {
    opacity: 1;
  }

  100% {
    transform: translateX(-100%);
    opacity: 0;
  }
}

.gift-modal {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  width: 95%;
  max-width: 900px;
  height: 85vh;
  position: relative;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow:

.overlay.active .gift-modal {
  transform: translateY(0) scale(1);
}

.gift-iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.gift-modal .close-btn {
  top: 15px !important;
  right: 15px !important;
  z-index: 100 !important;
}

.gift-modal .fullscreen-btn {
  position: absolute;
  top: 15px;
  right: 65px;
  width: 40px;
  height: 40px;
  background: #d81b60;
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(216, 27, 96, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;

.gift-modal .fullscreen-btn:hover {

.gift-modal:fullscreen {

@media (max-width: 600px) {
  .gift-modal {
    height: 80vh;
  }
}

/* Lock Screen Styles */
.lock-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ffd1dc 0%, #ffafbd 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5000;
  transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.5s ease;
}

.lock-screen::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(45deg, rgba(255, 255, 255, 0.1) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255, 255, 255, 0.1) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.1) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.1) 75%);
  background-size: 60px 60px;
  background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
  pointer-events: none;
}

.lock-screen.unlocked {
  transform: translateY(-100%);
  opacity: 0;
  pointer-events: none;
}

.lock-content {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  padding: 50px;
  border-radius: 50px;
  text-align: center;
  box-shadow:
    0 30px 60px rgba(216, 27, 96, 0.2),
    0 0 0 10px rgba(255, 255, 255, 0.1);
  width: 90%;
  max-width: 850px;
  animation: fadeIn 1s ease;
  display: flex;
  align-items: center;
  gap: 50px;
  position: relative;
  z-index: 10;
}

.lock-image {
  flex: 1;
  max-width: 350px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  cursor: none;
}

.lock-image img {
  width: 100%;
  height: auto;
  border-radius: 20px;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
  border: 5px solid white;
}

.lock-form {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.lock-icon {
  font-size: 3rem;
  color: #d81b60;
  margin-bottom: 20px;
  animation: heartbeat 1.5s ease infinite;
}

@keyframes heartbeat {
  0% {
    transform: scale(1);
  }

  15% {
    transform: scale(1.15);
  }

  30% {
    transform: scale(1);
  }

  45% {
    transform: scale(1.15);
  }

  60% {
    transform: scale(1);
  }
}



.pass-dots {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 40px;
}

.dot {
  width: 16px;
  height: 16px;
  border: 2px solid #d81b60;
  border-radius: 50%;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.dot.active {
  background: #d81b60;
  transform: scale(1.2);
  box-shadow: 0 0 10px rgba(216, 27, 96, 0.5);
}

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.num-btn {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.1);
  color: #d81b60;
  font-size: 1.6rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(5px);
}

.num-btn:hover {
  background: rgba(255, 255, 255, 0.4);
  transform: scale(1.1);
  border-color: rgba(255, 255, 255, 0.6);
  box-shadow: 0 10px 20px rgba(216, 27, 96, 0.1);
}

.num-btn:active {
  transform: scale(0.9);
  background: #d81b60;
  color: white;
}

.num-btn.blank {
  visibility: hidden;
}

.num-btn.delete-btn {
  font-size: 1.4rem;
  border: none;
  background: transparent;
}

.num-btn.delete-btn:hover {
  background: rgba(255, 255, 255, 0.2);
}

/* Shake Animation */
.shake {
  animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
}

@keyframes shake {

  10%,
  90% {
    transform: translate3d(-1px, 0, 0);
  }

  20%,
  80% {
    transform: translate3d(2px, 0, 0);
  }

  30%,
  50%,
  70% {
    transform: translate3d(-4px, 0, 0);
  }

  40%,
  60% {
    transform: translate3d(4px, 0, 0);
  }
}

.main-content-hidden {
  filter: blur(20px);
  opacity: 0.3;
  transition: all 1s ease;
}

.main-content-visible {
  filter: blur(0);
  opacity: 1;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  .lock-content {
    flex-direction: column;
    padding: 20px 15px;
    max-width: 320px;
    /* Nhỏ hơn cho điện thoại */

  transform: scale(0.9);

/* Menu Styles */
.menu-container {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10000;
}

.menu-trigger {
  width: 50px;
  height: 50px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.menu-trigger:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: scale(1.1);
}

.menu-options {
  display: flex;
  flex-direction: column-reverse;
  gap: 15px;
  margin-bottom: 15px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.menu-options.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

.menu-option {
  width: 45px;
  height: 45px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.menu-option:hover {
  background: #f672b0;
  transform: scale(1.1);
}

.menu-option#giftBtn.active {
  background: #f672b0;
  box-shadow: 0 0 15px #f672b0;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(5px);
  display: none;
  align-items: center;

/* Responsive Adjustments */
@media (max-width: 600px) {
  .flowers {
    transform: scale(0.6);
    /* Slightly larger for better visibility */
    transform-origin: bottom center;
    bottom: 15vh;
    /* Raise the whole flower group higher from the bottom edge */
    position: relative;
  }

  /* Reduce spread to avoid horizontal overflow on very narrow screens */
  .long-g {
    left: -25vmin;
  }

  .long-g--2,
  .long-g--3 {
    left: -20vmin;
  }

  .long-g--4 {
    left: 12vmin;
  }

  .long-g--5 {
    left: 20vmin;
  }

  .long-g--7 {
    left: 15vmin;
  }

  .flower {
    bottom: 0;
    /* Align to the base of the raised .flowers container */
  }

  .modal-content {
    padding: 20px;
    width: 92%;
    max-height: 85vh;
    overflow-y: auto;
  }

  .menu-container {
    bottom: 70px;
    /* Raise menu higher to avoid system gestures/rounded corners */
    left: 30px;
    /* Move inward from the edge */
  }

  .floating-gift {
    width: 180px;
  }

  .open-text {
    font-size: 20px;
  }
}

/* Landscape orientation optimization */
@media (max-height: 500px) {
  .flowers {
    transform: scale(0.5);
  }

  .modal-content {
    max-height: 90vh;
    overflow-y: auto;
  }
}


/* Intro Overlay Styles */
.intro-overlay {

  left: 0;
  width: 100%;
  height: 100%;
  background: #000;

  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20000;

}

  width: 250px;

  color: white;
  margin-top: 20px;

}

.gift-main-content.hidden {
  display: none;
  opacity: 0;
}

.gift-main-content {
  display: block;
  opacity: 1;
  transition: opacity 1s ease;
}

@keyframes floatGift {

  0%,

    transform: translateY(0);
  }

  50% {

}

@keyframes pulseText {

  0%,
  100% {
    opacity: 0.8;
    transform: scale(1);
  }

  50% {
    opacity: 1;
    transform: scale(1.1);
  }
}

.intro-overlay.fade-out {

    "https://i.pinimg.com/originals/88/23/82/882382f97862c72e60fc06822e36eb55.gif",

  ];

  const isGif = Math.random() > 0.5;

  if (isGif) {
    const img = document.createElement("img");

    img.style.width = `${gifSize}px`;

    heart.innerText = icons[Math.floor(Math.random() * icons.length)];

  heart.style.left = `${left}%`;
  heart.style.animationDuration = `${duration}s`;
  heart.style.opacity = opacity;
  heartsContainer.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, duration * 1000);
}

const btnLetter = document.getElementById("btn-letter");
const letterOverlay = document.getElementById("letter-overlay");
const closeLetter = document.getElementById("close-letter");
const letterBody = document.getElementById("letter-body");

let typingInterval;
let paragraphIndex = 0;
let charIndex = 0;
let isTyping = false;

function typeWriter() {
  if (paragraphIndex < letterText.length) {
    isTyping = true;
    let p = letterBody.lastElementChild;
    if (!p || charIndex === 0) {
      p = document.createElement("p");
      if (paragraphIndex === letterText.length - 1) {
        p.classList.add("letter-footer");
      }
      letterBody.appendChild(p);
    }

    p.textContent += letterText[paragraphIndex][charIndex];
    charIndex++;
    letterBody.scrollTop = letterBody.scrollHeight;

    if (charIndex < letterText[paragraphIndex].length) {
      typingInterval = setTimeout(typeWriter, 30);
    } else {
      paragraphIndex++;
      charIndex = 0;
      typingInterval = setTimeout(typeWriter, 500);
    }
  } else {
    isTyping = false;
  }
}

btnLetter.addEventListener("click", () => {
  letterOverlay.classList.add("active");

  if (!isTyping && paragraphIndex < letterText.length) {
    setTimeout(typeWriter, 500);
  }
});

closeLetter.addEventListener("click", () => {
  letterOverlay.classList.remove("active");
  clearTimeout(typingInterval);
  isTyping = false;
});

let songIndex = 0;

function loadSong(song) {
  songTitle.innerText = song.title;
  songArtist.style.display = "none";
  albumArt.src = song.cover;
  audioPlayer.src = song.src;
  updateSongListUI();
}

function updateSongListUI() {
  const items = document.querySelectorAll(".song-item");
  items.forEach((item, index) => {
    if (index === songIndex) {
      item.classList.add("active");
    } else {
      item.classList.remove("active");
    }
  });
}

function playSong() {
  const playPromise = audioPlayer.play();

  if (playPromise !== undefined) {
    playPromise.then(() => {
      isPlaying = true;
      playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
      musicStarted = true;
      console.log("Bản quyền thuộc về Tiengbip");
      console.log("Tiktok: https://www.tiktok.com/@tiengbip?_r=1&_t=ZS-94UqMeNuFyW");
      console.log("Github: https://github.com/Tiengbip6110");
    }).catch(error => {
      console.log("Phát nhạc bị chặn hoặc lỗi, đang đợi tương tác tiếp theo...");
      isPlaying = false;
      playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      musicStarted = false;
    });
  }
}

function pauseSong() {
  isPlaying = false;
  playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
  audioPlayer.pause();
}

function prevSong() {
  songIndex--;
  if (songIndex < 0) songIndex = songs.length - 1;
  loadSong(songs[songIndex]);
  playSong();
}

function nextSong() {
  songIndex++;
  if (songIndex > songs.length - 1) songIndex = 0;
  loadSong(songs[songIndex]);
  playSong();
}

function updateProgress(e) {
  const { duration, currentTime } = e.srcElement;
  if (isNaN(duration)) return;
  const progressPercent = (currentTime / duration) * 100;
  progress.style.width = `${progressPercent}%`;
  currentTimeEl.innerText = formatTime(currentTime);
  durationEl.innerText = formatTime(duration);
}

function formatTime(seconds) {
  const min = Math.floor(seconds / 60);
  const sec = Math.floor(seconds % 60);
  return `${min}:${sec < 10 ? "0" : ""}${sec}`;
}

function setProgress(e) {
  const width = this.clientWidth;
  const clickX = e.offsetX;
  const duration = audioPlayer.duration;
  audioPlayer.currentTime = (clickX / width) * duration;
}

    songIndex = index;
    loadSong(songs[songIndex]);
    playSong();
  });
  songListContainer.appendChild(item);
});

function populateGallery() {
  galleryTop.innerHTML = "";
  galleryBottom.innerHTML = "";

  const topImages = imageFiles.slice(0, 9);
  const bottomImages = imageFiles.slice(9);

  const createImg = (src) => {
    const img = document.createElement("img");
    img.src = src;
    img.loading = "lazy";
    img.addEventListener("click", (e) => {
      e.stopPropagation();
      openLightbox(src);
    });
    return img;
  };

  [...topImages, ...topImages].forEach((src) =>
    galleryTop.appendChild(createImg(src)),
  );
  [...bottomImages, ...bottomImages].forEach((src) =>
    galleryBottom.appendChild(createImg(src)),
  );
}

function openLightbox(src) {
  lightboxImg.src = src;
  lightboxOverlay.classList.add("active");
}

closeLightbox.addEventListener("click", () => {
  lightboxOverlay.classList.remove("active");
});

  if (e.target === lightboxOverlay) lightboxOverlay.classList.remove("active");
});

function makeDraggable(element) {
  let isDown = false;
  let startX;
  let scrollLeft;

  element.addEventListener("mousedown", (e) => {
    isDown = true;
    element.style.cursor = "grabbing";
    element.querySelector(".gallery-row").style.animationPlayState = "paused";
  });

  window.addEventListener("mouseup", () => {
    isDown = false;
    element.style.cursor = "grab";
    const row = element.querySelector(".gallery-row");
    if (row) row.style.animationPlayState = "running";
  });

  element.addEventListener("mouseleave", () => {
    isDown = false;
    const row = element.querySelector(".gallery-row");
    if (row) row.style.animationPlayState = "running";
  });
}

btnImage.addEventListener("click", () => {
  populateGallery();
  imageOverlay.classList.add("active");
});

    if (index < enteredPin.length) {
      dot.classList.add("active");
    } else {
      dot.classList.remove("active");
    }
  });
}

function handleInput(num) {
  if (!lockScreen || lockScreen.classList.contains("unlocked")) return;

  if (enteredPin.length < 4) {
    enteredPin += num;
    updateDots();

    if (enteredPin.length === 4) {
      checkPin(); // Call immediately, no setTimeout to preserve user gesture
    }
  }
}

function checkPin() {
  if (enteredPin === correctPin) {
    unlock();
  } else {
    fail();
  }
}

function unlock() {
  lockScreen.classList.add("unlocked");
  mainContent.classList.remove("main-content-hidden");
  mainContent.classList.add("main-content-visible");
  enteredPin = "";
  updateDots();
  startMusic(); // Trigger music immediately upon unlock
}

function fail() {
  const dotsContainer = document.getElementById("pass-dots");
  dotsContainer.classList.add("shake");

  if (navigator.vibrate) {
    navigator.vibrate(200);
  }

  setTimeout(() => {
    dotsContainer.classList.remove("shake");
    enteredPin = "";
    updateDots();
  }, 500);
}

function deleteLastDigit() {
  if (enteredPin.length > 0) {
    enteredPin = enteredPin.slice(0, -1);
    updateDots();
  }
}

if (numBtns) {
  numBtns.forEach(btn => {
    btn.addEventListener("click", (e) => {
      // e.stopPropagation(); // Removed to allow global click listener to catch interaction
      handleInput(btn.getAttribute("data-value"));
    });
  });
}

if (deleteBtn) {
  deleteBtn.addEventListener("click", (e) => {
    // e.stopPropagation(); // Removed
    deleteLastDigit();
  });
}

document.addEventListener("keydown", (e) => {
  if (!lockScreen || lockScreen.classList.contains("unlocked")) return;

  if (e.key >= "0" && e.key <= "9") {
    handleInput(e.key);
  } else if (e.key === "Backspace") {
    deleteLastDigit();
  }
});

const resetLockBtn = document.getElementById("btn-reset-lock");
if (resetLockBtn) {
  resetLockBtn.addEventListener("click", () => {
    window.location.reload();
  });
}






let explosionIcon = "💗";
let isGifting = true;
let giftInterval = null;
let isMessaging = true;
let messageInterval = null;

let messages = [];


messages = [
  "Chúc các bạn nữ ngày 8/3 vui vẻ nha!!!",
  "Xinh đẹp tuyệt trần",
  "Luôn được yêu thương ❤️",
  "Chúc các bạn luôn vui vẻ",
  "Hay ăn chóng lớn nha",
  "Chúc các bạn thật hạnh phúc ❤️",
  "Những cô công chúa xinh đẹp",
  "Mãi mãi hạnh phúc nhé",
  "Cười nhiều lên nha",
  "Chúc các bạn luôn được yêu thương! 🌸"
];


const giftMainContent = document.getElementById("giftMainContent");


        const introOverlay = document.getElementById("introOverlay");
        if (introOverlay) {
                introOverlay.addEventListener("click", () => {
                        introOverlay.classList.add("fade-out");
                        startExperience();
                });
        }

function startExperience() {
        if (giftMainContent.classList.contains('hidden')) {
                giftMainContent.classList.remove("hidden");
        }

        setTimeout(() => {
                createFallingImage();
                giftInterval = setInterval(createFallingImage, 1000);
                createFallingMessage();
                messageInterval = setInterval(createFallingMessage, 1500);
        }, 5000);
}





function createFallingImage() {
        if (!isGifting) return;

        const img = document.createElement("img");
        const randomNum = Math.floor(Math.random() * 20) + 1;
        img.src = imageFiles[Math.floor(Math.random() * imageFiles.length)];
        img.className = "falling-image";

        const width = window.innerWidth;
        const size = width < 600 ? Math.random() * 40 + 50 : Math.random() * 60 + 60;
        const startX = Math.random() * (width - size);
        const duration = Math.random() * 4 + 4;

        img.style.left = startX + "px";
        img.style.width = size + "px";
        img.style.height = "auto";
        img.style.animationDuration = duration + "s";

        document.body.appendChild(img);

        setTimeout(() => {
                img.remove();
        }, duration * 1000);
}

function createFallingMessage() {
        if (!isMessaging) return;

        const msgDiv = document.createElement("div");
        msgDiv.className = "falling-message";
        msgDiv.innerText = messages[Math.floor(Math.random() * messages.length)];

        const colors = [
                { text: "#ff69b4", border: "#ffb6c1" },
                { text: "#9370db", border: "#e6e6fa" },
                { text: "#40e0d0", border: "#afeeee" },
                { text: "#ff8c00", border: "#ffe4b5" },
                { text: "#20b2aa", border: "#e0ffff" },
                { text: "#ff1493", border: "#ffc0cb" }
        ];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];

        const width = window.innerWidth;
        const padding = 20;
        const startX = Math.random() * (width - 180 - padding * 2) + padding;
        const duration = Math.random() * 5 + 5;
        const fontSize = width < 600 ? Math.random() * 4 + 14 : Math.random() * 6 + 16;

        msgDiv.style.left = Math.max(padding, startX) + "px";
        msgDiv.style.fontSize = fontSize + "px";
        msgDiv.style.color = randomColor.text;
        msgDiv.style.borderColor = randomColor.border;
        msgDiv.style.animationDuration = duration + "s";

        document.body.appendChild(msgDiv);

        setTimeout(() => {
                msgDiv.remove();
        }, duration * 1000);
}

// Explosion Effect
document.addEventListener("click", (e) => {
        createHearts(e.clientX, e.clientY);
});

document.addEventListener("touchstart", (e) => {
        createHearts(e.touches[0].clientX, e.touches[0].clientY);
});

function createHearts(x, y) {
        const numHearts = 15;
        const icons = Array.from(explosionIcon).filter(char => char.trim() !== "");

        for (let i = 0; i < numHearts; i++) {
                const heart = document.createElement("div");
                heart.innerHTML = icons[Math.floor(Math.random() * icons.length)] || "💗";
                heart.className = "explosion-heart";

                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 150;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;

                heart.style.setProperty("--x", dx);
                heart.style.setProperty("--y", dy);
                heart.style.left = x + "px";
                heart.style.top = y + "px";
                heart.style.fontSize = Math.random() * 20 + 10 + "px";
                heart.style.setProperty("--r", Math.random() * 360 - 180 + "deg");

                document.body.appendChild(heart);

                setTimeout(() => {
                        heart.remove();
                }, 1000);
        }
}
